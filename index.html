<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Bingo Grid</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            font-family: sans-serif;
            min-height: 100vh;
            max-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        /* BINGO Tracker Headers */
        .bingo-tracker {
            display: flex;
            justify-content: space-evenly;
            width: max-content;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .tracker-cell {
            width: 45px;
            height: 45px;
            border: 2px solid #ffffff;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background-color 0.2s ease-in-out, color 0.2s ease-in-out;
            border-radius: 4px;
            user-select: none;
        }

        .tracker-cell.active {
            background-color: #ffffff;
            color: #000000;
        }

        /* Responsive Square Grid Wrapper */
        .grid-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 4px;
        }

        @media (min-width: 768px) {
            .grid-wrapper {
                height: 60vh;
                width: auto;
            }
        }

        /* The Grid Cells */
        .cell {
            position: relative;
            background-color: #000000;
            border: 3px solid #ffffff;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.3ms ease-in-out, color 0.3ms ease-in-out;
        }

        /* Play Mode States */
        .cell.temp {
            background-color: #a3ddff;
            color: #000000;
        }

        /* Confirmed state transforms the raw text into a solid marker dot */
        .cell.confirmed {
            background-color: #dee0e1;
            color: transparent; /* Hides the number text entirely */
        }

        .cell.confirmed::before {
            content: '';
            position: absolute;
            width: 16px; /* Dot size proportional to numbers */
            height: 16px;
            background-color: #000000;
            border-radius: 50%;
            z-index: 1;
        }

        /* Base rule for strike lines */
        .cell[class*="strike-"]::after {
            content: '';
            position: absolute;
            background-color: #dc3545; /* Crimson line color */
            z-index: 2; /* Sits over the confirmed dot */
            pointer-events: none;
            border-radius: 2px;
        }

        /* Directional Line Styles */
        .cell.strike-horizontal::after {
            width: 100%;
            height: 4px;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
        }

        .cell.strike-vertical::after {
            width: 4px;
            height: 100%;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
        }

        .cell.strike-diagonal-left::after {
            width: 145%; /* Hypotenuse coverage factor */
            height: 4px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
        }

        .cell.strike-diagonal-right::after {
            width: 145%;
            height: 4px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
        }

        /* Controls Area */
        .controls {
            margin-top: 2.5rem;
            display: flex;
            gap: 1.5rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            font-size: 1.1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: opacity 0.2s;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-success { background-color: #198754; color: white; }
        .btn-danger { background-color: #dc3545; color: white; }
        .btn-secondary { background-color: #6c757d; color: white; }

        /* Modal Structure */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.show {
            visibility: visible;
            opacity: 1;
        }

        .modal-box {
            background: #222;
            padding: 2rem;
            border-radius: 8px;
            border: 2px solid #fff;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .modal-actions {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>

    <!-- Letter Tracker -->
    <div class="bingo-tracker" id="trackerGroup">
        <div class="tracker-cell">B</div>
        <div class="tracker-cell">I</div>
        <div class="tracker-cell">N</div>
        <div class="tracker-cell">G</div>
        <div class="tracker-cell">O</div>
    </div>

    <!-- 5x5 Grid -->
    <div class="grid-wrapper" id="bingoGrid"></div>

    <!-- Actions -->
    <div class="controls">
        <button id="startBtn" class="btn btn-success" disabled>
            <i class="fa-solid fa-play"></i> Start
        </button>
        <button id="resetBtn" class="btn btn-danger">
            <i class="fa-solid fa-arrow-rotate-left"></i> Reset
        </button>
    </div>

    <!-- Confirm Modal -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal-box">
            <h3>Start a new game?</h3>
            <p style="margin-top: 0.5rem; color: #aaa;">This will wipe your current grid clean.</p>
            <div class="modal-actions">
                <button class="btn btn-success" id="modalYes">Yes</button>
                <button class="btn btn-secondary" id="modalNo">No</button>
            </div>
        </div>
    </div>

    <script>
        const grid = document.getElementById('bingoGrid');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const modal = document.getElementById('confirmModal');
        const trackerCells = document.querySelectorAll('.tracker-cell');
        
        let currentNumber = 1;
        let isGameStarted = false;
        let fillHistory = []; 
        let cellElements = [];

        // Categorized win lines to trace directional paths precisely
        const winLines = [
            { type: 'strike-horizontal', cells: [0, 1, 2, 3, 4] },
            { type: 'strike-horizontal', cells: [5, 6, 7, 8, 9] },
            { type: 'strike-horizontal', cells: [10, 11, 12, 13, 14] },
            { type: 'strike-horizontal', cells: [15, 16, 17, 18, 19] },
            { type: 'strike-horizontal', cells: [20, 21, 22, 23, 24] },
            
            { type: 'strike-vertical', cells: [0, 5, 10, 15, 20] },
            { type: 'strike-vertical', cells: [1, 6, 11, 16, 21] },
            { type: 'strike-vertical', cells: [2, 7, 12, 17, 22] },
            { type: 'strike-vertical', cells: [3, 8, 13, 18, 23] },
            { type: 'strike-vertical', cells: [4, 9, 14, 19, 24] },
            
            { type: 'strike-diagonal-left', cells: [0, 6, 12, 18, 24] },  // Top-Left to Bottom-Right (\)
            { type: 'strike-diagonal-right', cells: [4, 8, 12, 16, 20] }  // Top-Right to Bottom-Left (/)
        ];

        // Generate cells
        for (let i = 0; i < 25; i++) {
            const cell = document.createElement('div');
            cell.classList.add('cell');
            cell.dataset.index = i;
            cell.addEventListener('click', () => handleCellClick(cell));
            grid.appendChild(cell);
            cellElements.push(cell);
        }

        // Keep tracker cell overrides active only outside game runtime
        trackerCells.forEach(tc => {
            tc.addEventListener('click', () => {
                if (!isGameStarted) tc.classList.toggle('active');
            });
        });

        function handleCellClick(cell) {
            if (!isGameStarted) {
                // Setup Phase
                if (!cell.textContent) {
                    cell.textContent = currentNumber;
                    fillHistory.push(cell);
                    currentNumber++;
                } else {
                    const lastFilledCell = fillHistory[fillHistory.length - 1];
                    if (cell === lastFilledCell) {
                        cell.textContent = '';
                        fillHistory.pop();
                        currentNumber--;
                    }
                }
                startBtn.disabled = fillHistory.length !== 25;

            } else {
                // Play Phase
                if (cell.classList.contains('confirmed')) return; 

                if (cell.classList.contains('temp')) {
                    cell.classList.remove('temp');
                    cell.classList.add('confirmed');
                    checkBingoProgress(); 
                } else {
                    document.querySelectorAll('.cell.temp').forEach(c => c.classList.remove('temp'));
                    cell.classList.add('temp');
                }
            }
        }

        function checkBingoProgress() {
            let completedLinesCount = 0;

            // Clear old strike styles to cleanly re-evaluate overlapping states
            cellElements.forEach(cell => {
                cell.classList.remove('strike-horizontal', 'strike-vertical', 'strike-diagonal-left', 'strike-diagonal-right');
            });

            winLines.forEach(line => {
                const isLineComplete = line.cells.every(index => cellElements[index].classList.contains('confirmed'));
                
                if (isLineComplete) {
                    completedLinesCount++;
                    // Inject correct angle layout directly onto the winning sequence nodes
                    line.cells.forEach(index => cellElements[index].classList.add(line.type));
                }
            });

            // Map completed rows to the B-I-N-G-O text banner sequence
            trackerCells.forEach((tc, idx) => {
                if (idx < completedLinesCount) {
                    tc.classList.add('active');
                } else {
                    tc.classList.remove('active');
                }
            });
        }

        startBtn.addEventListener('click', () => {
            if (!isGameStarted) {
                isGameStarted = true;
                startBtn.innerHTML = '<i class="fa-regular fa-circle-question"></i>';
                startBtn.className = 'btn btn-secondary';
            } else {
                modal.classList.add('show');
            }
        });

        resetBtn.addEventListener('click', clearBoard);
        document.getElementById('modalYes').addEventListener('click', () => {
            modal.classList.remove('show');
            clearBoard();
        });
        document.getElementById('modalNo').addEventListener('click', () => {
            modal.classList.remove('show');
        });

        function clearBoard() {
            cellElements.forEach(cell => {
                cell.textContent = '';
                cell.className = 'cell';
            });
            trackerCells.forEach(tc => tc.classList.remove('active'));
            
            currentNumber = 1;
            isGameStarted = false;
            fillHistory = [];
            
            startBtn.disabled = true;
            startBtn.innerHTML = '<i class="fa-solid fa-play"></i> Start';
            startBtn.className = 'btn btn-success';
        }
    </script>
</body>
</html>
