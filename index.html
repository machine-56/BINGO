<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwritten Bingo Card</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <!-- B I N G O -->
    <div class="bingo-tracker" id="trackerGroup">
        <div class="tracker-cell">B</div>
        <div class="tracker-cell">I</div>
        <div class="tracker-cell">N</div>
        <div class="tracker-cell">G</div>
        <div class="tracker-cell">O</div>
    </div>

    <!-- 5x5 Grid Wrapper -->
    <div class="grid-wrapper" id="bingoGrid"></div>

    <!-- Actions Area -->
    <div class="controls">
        <button id="startBtn" class="btn btn-success" disabled>
            <i class="fa-solid fa-play"></i> Start
        </button>
        <button id="resetBtn" class="btn btn-danger">
            <i class="fa-solid fa-arrow-rotate-left"></i> Reset
        </button>
    </div>

    <!-- Template Reuse Confirm Modal -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal-box">
            <h3>Reuse same template?</h3>
            <p style="margin-top: 0.5rem; color: #aaa;">This keeps your number arrangement but clears all markers.</p>
            <div class="modal-actions">
                <button class="btn btn-success" id="modalYes">Yes</button>
                <button class="btn btn-secondary" id="modalNo">No</button>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
